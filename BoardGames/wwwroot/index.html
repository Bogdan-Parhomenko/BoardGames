<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Поиск компании для игр в настолки</title>
    <link rel="icon" type="image/png" href="/img/chess.png" sizes="32x32" />
    <link rel="shortcut icon" href="/img/chess.png" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
    <header class="header">
        <div class="logo">
            <img src="img/chess.png" alt="Логотип" class="logo-icon" />
            <span>Настолки&nbsp;вместе</span>
        </div>
        <nav class="nav">
            <button id="nav-auth" class="nav-btn" onclick="showSection('auth')">Вход / Регистрация</button>
            <button id="nav-events" class="nav-btn hidden" onclick="showSection('events')">События</button>
            <button id="nav-chats" class="nav-btn hidden" onclick="showSection('chats')">Сообщения <span id="nav-chats-badge" class="nav-badge hidden">0</span></button>
            <button id="nav-favorites" class="nav-btn hidden" onclick="showSection('favorites')">Избранное</button>
            <button id="nav-profile" class="nav-btn hidden" onclick="showSection('profile')">Профиль</button>
            <button id="nav-logout" class="nav-btn hidden" onclick="logout()">Выход</button>
        </nav>
        <div id="user-info" class="user-info hidden">
            <img id="user-photo-small" class="user-photo-small" alt="Фото" />
            <span id="user-name-small"></span>
        </div>
    </header>

    <main class="main">
        <!-- Блок уведомлений -->
        <div id="message" class="message hidden"></div>

        <!-- Секция авторизации / регистрации -->
        <section id="section-auth" class="card">
            <h2>Вход</h2>
            <form id="login-form" onsubmit="loginUser(event)">
                <label>
                    Логин
                    <input type="text" id="login-login" required />
                </label>
                <label>
                    Пароль
                    <input type="password" id="login-password" required />
                </label>
                <button type="submit" class="btn primary">Войти</button>
            </form>

            <hr class="divider" />

            <h2>Регистрация</h2>
            <form id="register-form" onsubmit="registerUser(event)">
                <label>
                    Логин
                    <input type="text" id="reg-login" required />
                </label>
                <label>
                    Имя (отображаемое)
                    <input type="text" id="reg-fullname" required />
                </label>
                <label>
                    Пароль
                    <input type="password" id="reg-password" required />
                </label>
                <button type="submit" class="btn secondary">Зарегистрироваться</button>
            </form>
        </section>

        <!-- Секция списка событий -->
        <section id="section-events" class="hidden">
            <div class="section-header">
                <h2>Игровые события</h2>
                <button class="btn primary" onclick="openEventForm()">Создать событие</button>
            </div>

            <div id="events-list" class="cards-list">
            </div>
        </section>

        <!-- Секция чатов -->
        <section id="section-chats" class="hidden">
            <div class="chats-container">
                <!-- Список чатов -->
                <div class="chats-sidebar" id="chats-sidebar">
                    <div class="chats-sidebar-header">
                        <h3>Сообщения</h3>
                    </div>
                    <div class="chats-list" id="chats-list">
                        <p class="chats-empty">Загрузка...</p>
                    </div>
                </div>

                <!-- Область чата -->
                <div class="chat-area" id="chat-area">
                    <div class="chat-placeholder">
                        <div class="chat-placeholder-icon">💬</div>
                        <p>Выберите чат для начала общения</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Секция профиля -->
        <section id="section-profile" class="hidden card">
            <h2>Профиль пользователя</h2>

            <div class="profile-photo-block">
                <img id="profile-photo-preview"
                     class="profile-photo-large"
                     src="img/user-placeholder.png"
                     alt="Фото профиля" />
            </div>

            <form id="profile-form" onsubmit="updateProfile(event)">
                <label>
                    Идентификатор
                    <input type="text" id="profile-id" disabled />
                </label>
                <label>
                    Логин
                    <input type="text" id="profile-login-current" disabled />
                </label>
                <label>
                    Имя
                    <input type="text" id="profile-fullname" required />
                </label>
                <label>
                    Описание
                    <textarea id="profile-description"></textarea>
                </label>
                <label>
                    Телефон
                    <input type="tel"
                           id="profile-phone"
                           pattern="^\+?[0-9\s\-()]{10,18}$"
                           inputmode="tel"
                           placeholder="+7 900 000-00-00"
                           title="Введите номер телефона в формате +7 900 000-00-00" />
                </label>
                <label>
                    Город
                    <input type="text" id="profile-city" />
                </label>
                <label>
                    Фото (URL)
                    <input type="text" id="profile-photo" />
                </label>

                <label class="file-label">
                    Загрузить новое фото
                    <input type="file" id="profile-photo-file" accept="image/*" />
                </label>

                <button type="submit" class="btn primary">Сохранить профиль</button>
            </form>

            <hr class="divider" />

            <h3>Изменение логина</h3>
            <form id="login-change-form" onsubmit="changeLogin(event)">
                <label>
                    Новый логин
                    <input type="email" id="profile-login-new" placeholder="name@example.com" required />
                </label>
                <button type="submit" class="btn secondary">Изменить логин</button>
            </form>

            <hr class="divider" />

            <h3>Изменение пароля</h3>
            <form id="password-change-form" onsubmit="changePassword(event)">
                <label>
                    Текущий пароль
                    <input type="password" id="profile-current-password" required />
                </label>
                <label>
                    Новый пароль
                    <input type="password" id="profile-new-password" required />
                </label>
                <button type="submit" class="btn secondary">Изменить пароль</button>
            </form>

            <hr class="divider" />

            <h3>Удаление аккаунта</h3>
            <button class="btn" onclick="deleteAccount()">Удалить аккаунт</button>
        </section>

        <!-- Секция избранных событий -->
        <section id="section-favorites" class="hidden">
            <div class="section-header">
                <h2>Избранные события</h2>
                <button class="btn primary" onclick="openFavoriteForm()">Создать шаблон</button>
            </div>

            <div id="favorites-list" class="cards-list">
            </div>
        </section>

        <!-- Модальное окно создания/редактирования события -->
        <div id="event-modal" class="modal hidden">
            <div class="modal-content card">
                <h3 id="event-modal-title">Создание события</h3>
                <form id="event-form" onsubmit="submitEventForm(event)">
                    <input type="hidden" id="event-id" />

                    <label>
                        Название
                        <input type="text" id="event-title" required />
                    </label>
                    <label>
                        Описание
                        <textarea id="event-description"></textarea>
                    </label>
                    <div class="flex-row">
                        <label>
                            Дата
                            <input type="date" id="event-date" required />
                        </label>
                        <label>
                            Время
                            <input type="time" id="event-time" required />
                        </label>
                    </div>
                    <label>
                        Длительность (минуты)
                        <input type="number" id="event-duration" min="0" />
                    </label>
                    <label>
                        Адрес
                        <input type="text" id="event-address" required />
                    </label>
                    <label>
                        Максимальное количество игроков
                        <input type="number" id="event-maxplayers" min="1" required />
                    </label>
                    <label class="select-label">
                        Категории
                        <select id="event-categories" class="select-multi" multiple size="4">
                        </select>
                        <span class="field-hint">Удерживайте Ctrl/Shift для выбора нескольких категорий</span>
                    </label>

                    <div class="modal-actions">
                        <button type="button" class="btn" onclick="closeEventForm()">Отмена</button>
                        <button type="submit" class="btn primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Модальное окно создания избранного события -->
        <div id="favorite-modal" class="modal hidden">
            <div class="modal-content card">
                <h3>Создание шаблона избранного события</h3>
                <form id="favorite-form" onsubmit="submitFavoriteForm(event)">
                    <label>
                        Название
                        <input type="text" id="fav-title" required />
                    </label>
                    <label>
                        Описание
                        <textarea id="fav-description"></textarea>
                    </label>
                    <label>
                        Адрес
                        <input type="text" id="fav-address" required />
                    </label>
                    <div class="modal-actions">
                        <button type="button" class="btn" onclick="closeFavoriteForm()">Отмена</button>
                        <button type="submit" class="btn primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Модальное окно подробной информации о событии -->
        <div id="event-details-modal" class="modal hidden">
            <div class="modal-content card">
                <h3 id="event-details-title"></h3>
                <div id="event-details-body"></div>
                <div class="modal-actions">
                    <button type="button" class="btn" onclick="closeEventDetails()">Закрыть</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно выбора смайликов -->
        <div id="emoji-picker" class="emoji-picker hidden">
            <div class="emoji-picker-content">
                <div class="emoji-picker-header">
                    <span>Выберите смайлик</span>
                    <button type="button" class="emoji-picker-close" onclick="closeEmojiPicker()">×</button>
                </div>
                <div class="emoji-grid" id="emoji-grid"></div>
            </div>
        </div>

    </main>
</div>

<script src="app.js"></script>
</body>
</html>
